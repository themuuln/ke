name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-latest
            artifact: ke-macos-arm64.zip
          - target: x86_64-apple-darwin
            runner: macos-latest
            artifact: ke-macos-x86_64.zip

    steps:
      - uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add target
        run: rustup target add ${{ matrix.target }}

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Run --help check
        run: |
          target/${{ matrix.target }}/release/ke --help

      - name: Package
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/ke dist/ke
          cp README.md dist/
          cd dist && zip -9 ../${{ matrix.artifact }} ke README.md
          shasum -a 256 ../${{ matrix.artifact }} > ../${{ matrix.artifact }}.sha256

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}
            ${{ matrix.artifact }}.sha256
          retention-days: 3

  publish:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: ke-macos-*
          path: dist
          merge-multiple: true

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.zip
            dist/*.zip.sha256
          fail_on_unmatched_files: true
          generate_release_notes: true
